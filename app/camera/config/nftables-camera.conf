#!/usr/sbin/nft -f
# Firewall rules for RPi Zero 2W Camera Node

flush ruleset

table inet filter {
    set server_ip {
        type ipv4_addr
        comment "Home server IP — set during pairing"
    }

    chain input {
        type filter hook input priority 0; policy drop;

        # Established connections
        ct state established,related accept

        # Loopback
        iif lo accept

        # SSH from server only
        tcp dport 22 ip saddr @server_ip accept

        # OTA update endpoint from server only
        tcp dport 8080 ip saddr @server_ip accept

        # mDNS (discovery)
        udp dport 5353 accept

        # DHCP client
        udp sport 67 udp dport 68 accept

        # DHCP server (for WiFi hotspot setup mode)
        udp dport 67 accept

        # DNS (for WiFi hotspot setup mode — NM's internal dnsmasq)
        udp dport 53 accept
        tcp dport 53 accept

        # HTTP setup wizard (first-boot only, port 80)
        tcp dport 80 accept

        # Log and drop
        log prefix "[CAM-DROPPED] " drop
    }

    chain output {
        type filter hook output priority 0; policy drop;

        # Established connections
        ct state established,related accept

        # Loopback
        oif lo accept

        # RTSPS to server only
        tcp dport 8554 ip daddr @server_ip accept

        # DNS
        udp dport 53 accept
        tcp dport 53 accept

        # DHCP (client requests + server responses for hotspot)
        udp dport 67 accept
        udp sport 67 udp dport 68 accept

        # NTP
        udp dport 123 accept

        # mDNS
        udp dport 5353 accept

        # Log and drop
        log prefix "[CAM-DROPPED-OUT] " drop
    }
}

# Audit log — security events
/data/logs/audit.log {
    size 50M
    rotate 10
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    maxage 90
}

# Monitor server application log
/data/logs/monitor.log {
    size 10M
    rotate 5
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    maxage 30
}

# FFmpeg pipeline stderr logs
/data/logs/ffmpeg/*.log {
    size 5M
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    maxage 7
}

# Camera streamer application log
/data/logs/camera.log {
    size 5M
    rotate 3
    compress
    delaycompress
    missingok
    notifempty
    create 0640 root root
    maxage 30
}

# HTTP — needed for setup wizard (phone on hotspot, no TLS)
# Also serves normal traffic; users can bookmark HTTPS after setup.
server {
    listen 80;
    server_name _;

    # Proxy to Flask app
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS live segments — served directly by nginx (fast)
    location /live/ {
        alias /data/live/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    # Recorded clips
    location /clips/ {
        alias /data/recordings/;
        autoindex off;
    }

    # Static assets
    location /static/ {
        alias /opt/monitor/monitor/static/;
        expires 1d;
        gzip on;
        gzip_types text/css application/javascript;
    }

    # Upload size for OTA images
    client_max_body_size 500M;

    # Timeouts for streaming
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
}

# HTTPS — secure access after setup
server {
    listen 443 ssl;
    server_name _;

    # TLS — self-signed cert from local CA
    ssl_certificate     /data/certs/server.crt;
    ssl_certificate_key /data/certs/server.key;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Proxy to Flask app
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # HLS live segments
    location /live/ {
        alias /data/live/;
        types {
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }
        add_header Cache-Control "no-cache";
        add_header Access-Control-Allow-Origin *;
    }

    # Recorded clips
    location /clips/ {
        alias /data/recordings/;
        autoindex off;
    }

    # Thumbnails
    location /snapshots/ {
        alias /data/recordings/;
    }

    # Static assets
    location /static/ {
        alias /opt/monitor/monitor/static/;
        expires 1d;
        gzip on;
        gzip_types text/css application/javascript;
    }

    # Upload size for OTA images
    client_max_body_size 500M;

    # Timeouts for streaming
    proxy_read_timeout 300;
    proxy_connect_timeout 300;
    proxy_send_timeout 300;
}

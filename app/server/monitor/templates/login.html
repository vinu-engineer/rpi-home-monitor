{% extends "base.html" %}
{% set hide_nav = true %}

{% block title %}Login - Home Monitor{% endblock %}

{% block content %}
<div class="login-page">
    <div class="login-card">
        <div class="login-card__title">Home Monitor</div>
        <div class="login-card__subtitle">Sign in to your dashboard</div>

        <div class="login-card__error" id="login-error"></div>

        <form id="login-form" autocomplete="on">
            <div class="form-group">
                <label for="login-username">Username</label>
                <input type="text" id="login-username" name="username" class="form-input"
                       placeholder="Enter username" autocomplete="username" required>
            </div>
            <div class="form-group">
                <label for="login-password">Password</label>
                <input type="password" id="login-password" name="password" class="form-input"
                       placeholder="Enter password" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn--primary btn--full" id="btn-login">
                Sign In
            </button>
        </form>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var form = document.getElementById('login-form');
    var errorEl = document.getElementById('login-error');
    var btnLogin = document.getElementById('btn-login');

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        errorEl.classList.remove('visible');
        errorEl.textContent = '';
        btnLogin.disabled = true;
        btnLogin.textContent = 'Signing in...';

        var username = document.getElementById('login-username').value.trim();
        var password = document.getElementById('login-password').value;

        if (!username || !password) {
            showError('Username and password are required.');
            return;
        }

        window.HM.api.post('/api/v1/auth/login', { username: username, password: password })
            .then(function(data) {
                window.HM.auth.setCsrfToken(data.csrf_token);
                window.HM.auth.setUser(data.user);
                window.location.href = '/dashboard';
            })
            .catch(function(err) {
                showError(err.message || 'Login failed. Please check your credentials.');
            });
    });

    function showError(msg) {
        errorEl.textContent = msg;
        errorEl.classList.add('visible');
        btnLogin.disabled = false;
        btnLogin.textContent = 'Sign In';
    }
})();
</script>
{% endblock %}

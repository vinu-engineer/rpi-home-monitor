# =============================================================
# local.conf — RPi 4 Model B Home Monitoring Server
# =============================================================

# --- Machine ---
MACHINE = "raspberrypi4-64"

# --- Distribution ---
DISTRO = "poky"

# --- Parallel build (adjust to your GCP VM cores) ---
# For a 4-core VM:
BB_NUMBER_THREADS = "8"
PARALLEL_MAKE = "-j 8"

# --- Shared downloads and sstate ---
DL_DIR = "${TOPDIR}/../downloads"
SSTATE_DIR = "${TOPDIR}/../sstate-cache"

# --- Disk space monitor (GCP VMs can fill up) ---
BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

# --- Package management (use deb for easy on-device installs later) ---
PACKAGE_CLASSES = "package_deb"

# --- Accept licenses for firmware blobs ---
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"

# --- Extra image features ---
EXTRA_IMAGE_FEATURES = "debug-tweaks ssh-server-openssh"

# --- RPi specific settings ---
# Enable UART for serial console debugging
ENABLE_UART = "1"

# GPU memory split — 128MB for camera/video processing
GPU_MEM = "128"

# Enable camera interface
RASPBERRYPI_CAMERA_V2 = "1"

# Enable I2C and SPI (for sensors later)
ENABLE_I2C = "1"
ENABLE_SPI_BUS = "1"

# WiFi and Bluetooth firmware
MACHINE_EXTRA_RRECOMMENDS += "linux-firmware-rpidistro-bcm43455"

# Use 64-bit kernel
KERNEL_IMAGETYPE = "Image"

# --- Systemd as init system ---
DISTRO_FEATURES:append = " systemd usrmerge"
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
DISTRO_FEATURES_BACKFILL_CONSIDERED += "sysvinit"

# --- Network features ---
DISTRO_FEATURES:append = " wifi"

# --- Image size (allow room for video storage) ---
IMAGE_ROOTFS_EXTRA_SPACE = "1048576"

# --- Don't generate tarballs (saves disk on GCP) ---
INHERIT += "rm_work"

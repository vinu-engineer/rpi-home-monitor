# =============================================================
# bblayers.conf — Layer configuration for home monitoring build
# =============================================================
# POKY_BBLAYERS_CONF_VERSION is increased each time build/conf/bblayers.conf
# changes incompatibly
POKY_BBLAYERS_CONF_VERSION = "2"

BBPATH = "${TOPDIR}"
BBFILES ?= ""

YOCTODIR = "${TOPDIR}/.."

BBLAYERS ?= " \
  ${YOCTODIR}/poky/meta \
  ${YOCTODIR}/poky/meta-poky \
  ${YOCTODIR}/poky/meta-yocto-bsp \
  ${YOCTODIR}/meta-raspberrypi \
  ${YOCTODIR}/meta-openembedded/meta-oe \
  ${YOCTODIR}/meta-openembedded/meta-python \
  ${YOCTODIR}/meta-openembedded/meta-networking \
  ${YOCTODIR}/meta-openembedded/meta-multimedia \
  ${YOCTODIR}/meta-openembedded/meta-webserver \
  ${YOCTODIR}/meta-home-monitor \
  "

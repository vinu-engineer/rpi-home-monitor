# =============================================================
# home-monitor.conf — Custom distribution for Home Monitor OS
#
# This replaces DISTRO="poky" with a product-specific distro
# that controls all system policy in one place.
# =============================================================

DISTRO = "home-monitor"
DISTRO_NAME = "Home Monitor OS"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "phase1"

# Maintainer
MAINTAINER = "vinu@engineer.com"

# --- System fundamentals ---
DISTRO_FEATURES = " \
    ipv4 \
    ipv6 \
    wifi \
    systemd \
    usrmerge \
    seccomp \
    pam \
    nfs \
    zeroconf \
    "

# Remove sysvinit backfill — we use systemd exclusively
DISTRO_FEATURES_BACKFILL_CONSIDERED = "sysvinit"

# --- Init system ---
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"

# --- Boot: U-Boot for A/B OTA partition switching (ADR-0008) ---
RPI_USE_U_BOOT = "1"

# --- Package management ---
PACKAGE_CLASSES = "package_deb"

# --- Licensing ---
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"

# --- Image defaults ---
# No debug tweaks by default — dev images add them explicitly
EXTRA_IMAGE_FEATURES ?= ""

# --- Build reproducibility ---
INHERIT += "create-spdx"
INHERIT += "rm_work"
# Keep image deploy artifacts (ext4.gz needed for SWU packaging)
RM_WORK_EXCLUDE += "home-monitor-image home-monitor-image-dev home-monitor-image-prod home-camera-image home-camera-image-dev home-camera-image-prod"

# --- Version pinning for critical packages ---
PREFERRED_VERSION_linux-raspberrypi = "6.6%"
PREFERRED_VERSION_python3 = "3.12%"
PREFERRED_VERSION_openssl = "3.5%"

# --- FFmpeg: use upstream 6.1.4 from poky instead of rpidistro-ffmpeg 4.3.4 ---
# rpidistro-ffmpeg 4.3 cannot probe raw H.264 streams (fails with
# "unspecified size") and lacks RTSP muxer TLS options (-tls_cert/-tls_key).
# Upstream ffmpeg 6.1.4 fixes both issues. The RPi-specific patches in
# rpidistro (MMAL, sand format) are not needed — we use libcamera-vid for
# capture and ffmpeg only does stream copy.
PREFERRED_PROVIDER_ffmpeg = "ffmpeg"
PREFERRED_PROVIDER_libav = "ffmpeg"
PREFERRED_PROVIDER_libpostproc = "ffmpeg"
BBMASK += "meta-raspberrypi/recipes-multimedia/rpidistro-ffmpeg"

# --- Disk space monitor ---
BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

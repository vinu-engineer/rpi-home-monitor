# =============================================================
# home-monitor.conf — Custom distribution for Home Monitor OS
#
# This replaces DISTRO="poky" with a product-specific distro
# that controls all system policy in one place.
# =============================================================

DISTRO = "home-monitor"
DISTRO_NAME = "Home Monitor OS"
DISTRO_VERSION = "1.0.0"
DISTRO_CODENAME = "phase1"

# Maintainer
MAINTAINER = "vinu.narayanan@hotmail.com"

# --- System fundamentals ---
DISTRO_FEATURES = " \
    ipv4 \
    ipv6 \
    wifi \
    systemd \
    usrmerge \
    seccomp \
    pam \
    nfs \
    zeroconf \
    "

# Remove sysvinit backfill — we use systemd exclusively
DISTRO_FEATURES_BACKFILL_CONSIDERED = "sysvinit"

# --- Init system ---
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"
VIRTUAL-RUNTIME_login_manager = "shadow-base"

# --- Package management ---
PACKAGE_CLASSES = "package_deb"

# --- Licensing ---
LICENSE_FLAGS_ACCEPTED = "synaptics-killswitch commercial"

# --- Image defaults ---
# No debug tweaks by default — dev images add them explicitly
EXTRA_IMAGE_FEATURES ?= ""

# --- Build reproducibility ---
INHERIT += "create-spdx"
INHERIT += "rm_work"

# --- Version pinning for critical packages ---
PREFERRED_VERSION_linux-raspberrypi = "6.6%"
PREFERRED_VERSION_python3 = "3.12%"
PREFERRED_VERSION_openssl = "3.5%"

# --- Disk space monitor ---
BB_DISKMON_DIRS ??= "\
    STOPTASKS,${TMPDIR},1G,100K \
    STOPTASKS,${DL_DIR},1G,100K \
    STOPTASKS,${SSTATE_DIR},1G,100K \
    STOPTASKS,/tmp,100M,100K \
    HALT,${TMPDIR},100M,1K \
    HALT,${DL_DIR},100M,1K \
    HALT,${SSTATE_DIR},100M,1K \
    HALT,/tmp,10M,1K"

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Monitor</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        header {
            background: #16213e;
            padding: 1rem;
            text-align: center;
            border-bottom: 2px solid #0f3460;
        }
        header h1 { font-size: 1.4rem; color: #e94560; }
        .container { padding: 1rem; max-width: 800px; margin: 0 auto; }
        .camera-card {
            background: #16213e;
            border-radius: 12px;
            margin-bottom: 1rem;
            overflow: hidden;
            border: 1px solid #0f3460;
        }
        .camera-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.8rem 1rem;
            background: #0f3460;
        }
        .camera-name { font-weight: 600; font-size: 1.1rem; }
        .status {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status.recording { background: #e94560; }
        .status.offline { background: #555; }
        .camera-body { padding: 1rem; }
        .camera-preview {
            background: #0a0a1a;
            border-radius: 8px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }
        .camera-preview img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .btn-row {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .btn {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            min-width: 80px;
            transition: opacity 0.2s;
        }
        .btn:active { opacity: 0.7; }
        .btn-live { background: #e94560; color: #fff; }
        .btn-snap { background: #0f3460; color: #fff; }
        .btn-rec { background: #28a745; color: #fff; }
        .btn-stop { background: #dc3545; color: #fff; }
        .btn-files { background: #533483; color: #fff; }
        .storage-bar {
            background: #0f3460;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1rem;
        }
        .storage-bar h3 { margin-bottom: 0.5rem; font-size: 0.9rem; }
        .bar-bg {
            background: #1a1a2e;
            border-radius: 4px;
            height: 8px;
            overflow: hidden;
        }
        .bar-fill {
            background: #e94560;
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .storage-text { font-size: 0.8rem; margin-top: 0.3rem; color: #aaa; }
        .recordings-list {
            background: #16213e;
            border-radius: 12px;
            padding: 1rem;
            margin-top: 0.5rem;
            display: none;
        }
        .recordings-list h3 { margin-bottom: 0.5rem; }
        .rec-item {
            display: flex;
            justify-content: space-between;
            padding: 0.5rem 0;
            border-bottom: 1px solid #0f3460;
            font-size: 0.85rem;
        }
        .rec-item a { color: #e94560; text-decoration: none; }
    </style>
</head>
<body>
    <header>
        <h1>Home Monitor</h1>
    </header>

    <div class="container">
        <div class="storage-bar" id="storage">
            <h3>Storage</h3>
            <div class="bar-bg"><div class="bar-fill" id="storageBar" style="width: 0%"></div></div>
            <div class="storage-text" id="storageText">Loading...</div>
        </div>

        {% for cam in cameras %}
        <div class="camera-card" data-cam-id="{{ cam.id }}">
            <div class="camera-header">
                <span class="camera-name">{{ cam.name }}</span>
                <span class="status offline" id="status-{{ cam.id }}">IDLE</span>
            </div>
            <div class="camera-body">
                <div class="camera-preview" id="preview-{{ cam.id }}">
                    <span style="color:#555">Tap Snapshot to preview</span>
                </div>
                <div class="btn-row">
                    <button class="btn btn-snap" onclick="snapshot('{{ cam.id }}')">Snapshot</button>
                    <button class="btn btn-rec" onclick="startRec('{{ cam.id }}')">Record</button>
                    <button class="btn btn-stop" onclick="stopRec('{{ cam.id }}')">Stop</button>
                    <button class="btn btn-files" onclick="showRecordings('{{ cam.id }}')">Files</button>
                </div>
                <div class="recordings-list" id="recs-{{ cam.id }}">
                    <h3>Recordings</h3>
                    <div id="recs-list-{{ cam.id }}"></div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>

    <script>
        function api(url, method) {
            return fetch(url, {method: method || 'GET'}).then(r => r.json());
        }

        function snapshot(camId) {
            const preview = document.getElementById('preview-' + camId);
            preview.innerHTML = '<span style="color:#555">Capturing...</span>';
            const img = new Image();
            img.onload = () => { preview.innerHTML = ''; preview.appendChild(img); };
            img.onerror = () => { preview.innerHTML = '<span style="color:#e94560">Failed</span>'; };
            img.src = '/api/snapshot/' + camId + '?t=' + Date.now();
        }

        function startRec(camId) {
            api('/api/record/' + camId + '/start', 'POST').then(() => refreshStatus());
        }

        function stopRec(camId) {
            api('/api/record/' + camId + '/stop', 'POST').then(() => refreshStatus());
        }

        function showRecordings(camId) {
            const el = document.getElementById('recs-' + camId);
            el.style.display = el.style.display === 'none' ? 'block' : 'block';
            api('/api/recordings/' + camId).then(files => {
                const list = document.getElementById('recs-list-' + camId);
                if (files.length === 0) {
                    list.innerHTML = '<div style="color:#555;padding:0.5rem 0">No recordings yet</div>';
                    return;
                }
                list.innerHTML = files.map(f =>
                    '<div class="rec-item">' +
                    '<a href="/api/recordings/' + camId + '/' + f.filename + '">' + f.filename + '</a>' +
                    '<span>' + f.size_mb + ' MB</span>' +
                    '</div>'
                ).join('');
            });
        }

        function refreshStatus() {
            api('/api/cameras').then(cameras => {
                cameras.forEach(cam => {
                    const el = document.getElementById('status-' + cam.id);
                    if (cam.recording) {
                        el.textContent = 'REC';
                        el.className = 'status recording';
                    } else {
                        el.textContent = 'IDLE';
                        el.className = 'status offline';
                    }
                });
            });
        }

        function refreshStorage() {
            api('/api/storage').then(s => {
                document.getElementById('storageBar').style.width = s.percent_used + '%';
                document.getElementById('storageText').textContent =
                    s.used_gb + ' GB / ' + s.total_gb + ' GB (' + s.percent_used + '% used)';
            });
        }

        refreshStatus();
        refreshStorage();
        setInterval(refreshStatus, 10000);
        setInterval(refreshStorage, 60000);
    </script>
</body>
</html>
